name: Build & Release Pear Desktop

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22.x"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build and Release Pear Desktop
    steps:
      - uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build .deb packages
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev fakeroot
          pnpm release:linux  # your script to create .deb files

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: "dist/*.deb"  # adjust path if your .deb output is different
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
